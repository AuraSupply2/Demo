<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}Negocio Demo{% endblock %} — Gestión</title>

  <!-- Bootstrap 5 -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <!-- Bootstrap Icons -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet" />
  <!-- Google Fonts: DM Sans + DM Mono -->
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />

  <style>
    /* ── Tokens ───────────────────────────────────────────────────── */
    :root {
      --sidebar-w: 240px;
      --bg:        #0f1117;
      --surface:   #181b23;
      --surface-2: #1e2130;
      --border:    #272b38;
      --accent:    #4f6ef7;
      --accent-2:  #38c6a0;
      --danger:    #f75f5f;
      --warn:      #f7b84f;
      --text:      #e8eaf0;
      --muted:     #6b7280;
      --radius:    10px;
      font-family: 'DM Sans', sans-serif;
    }

    /* ── Reset / Base ─────────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; }
    body {
      background: var(--bg);
      color: var(--text);
      margin: 0;
      min-height: 100vh;
      display: flex;
    }

    /* ── Sidebar ──────────────────────────────────────────────────── */
    .sidebar {
      width: var(--sidebar-w);
      min-height: 100vh;
      background: var(--surface);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      position: fixed;
      top: 0; left: 0;
      z-index: 100;
    }

    .sidebar-brand {
      padding: 24px 20px 20px;
      border-bottom: 1px solid var(--border);
    }
    .sidebar-brand .logo-mark {
      width: 34px; height: 34px;
      background: var(--accent);
      border-radius: 8px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      color: #fff;
      font-weight: 700;
      margin-right: 10px;
    }
    .sidebar-brand .brand-name {
      font-weight: 700;
      font-size: 15px;
      letter-spacing: -0.3px;
      color: var(--text);
    }
    .sidebar-brand .brand-tag {
      font-size: 10px;
      color: var(--muted);
      letter-spacing: 0.5px;
      text-transform: uppercase;
    }

    .sidebar-nav {
      flex: 1;
      padding: 16px 12px;
    }
    .nav-section-label {
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 1px;
      text-transform: uppercase;
      color: var(--muted);
      padding: 8px 8px 4px;
      margin-top: 8px;
    }
    .sidebar-link {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 9px 12px;
      border-radius: 8px;
      color: var(--muted);
      text-decoration: none;
      font-size: 14px;
      font-weight: 500;
      transition: background 0.15s, color 0.15s;
      margin-bottom: 2px;
    }
    .sidebar-link i { font-size: 16px; }
    .sidebar-link:hover {
      background: var(--surface-2);
      color: var(--text);
    }
    .sidebar-link.active {
      background: rgba(79, 110, 247, 0.15);
      color: var(--accent);
    }
    .sidebar-link.active i { color: var(--accent); }

    .sidebar-footer {
      padding: 16px 20px;
      border-top: 1px solid var(--border);
      font-size: 12px;
      color: var(--muted);
    }
    .sidebar-footer span { color: var(--accent-2); font-family: 'DM Mono', monospace; }

    /* ── Main content ─────────────────────────────────────────────── */
    .main-wrap {
      margin-left: var(--sidebar-w);
      flex: 1;
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }

    .topbar {
      height: 60px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 28px;
      position: sticky;
      top: 0;
      z-index: 50;
    }
    .topbar-title {
      font-size: 15px;
      font-weight: 600;
      color: var(--text);
    }
    .topbar-actions { display: flex; align-items: center; gap: 10px; }

    .page-body { padding: 28px; flex: 1; }

    /* ── Cards ────────────────────────────────────────────────────── */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
    }
    .card-header {
      background: transparent;
      border-bottom: 1px solid var(--border);
      padding: 14px 20px;
      font-weight: 600;
      font-size: 14px;
    }
    .card-body { padding: 20px; }

    /* ── Stat cards ───────────────────────────────────────────────── */
    .stat-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 22px 24px;
      position: relative;
      overflow: hidden;
    }
    .stat-card::after {
      content: '';
      position: absolute;
      top: -20px; right: -20px;
      width: 80px; height: 80px;
      border-radius: 50%;
      opacity: 0.07;
    }
    .stat-card.accent::after  { background: var(--accent); }
    .stat-card.green::after   { background: var(--accent-2); }
    .stat-card.warn::after    { background: var(--warn); }
    .stat-card.danger::after  { background: var(--danger); }

    .stat-icon {
      width: 40px; height: 40px;
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      font-size: 18px;
      margin-bottom: 14px;
    }
    .stat-icon.accent  { background: rgba(79,110,247,.15); color: var(--accent); }
    .stat-icon.green   { background: rgba(56,198,160,.15); color: var(--accent-2); }
    .stat-icon.warn    { background: rgba(247,184,79,.15);  color: var(--warn); }
    .stat-icon.danger  { background: rgba(247,95,95,.15);   color: var(--danger); }

    .stat-value {
      font-size: 28px;
      font-weight: 700;
      letter-spacing: -1px;
      line-height: 1;
      margin-bottom: 4px;
    }
    .stat-label { font-size: 13px; color: var(--muted); }

    /* ── Tables ───────────────────────────────────────────────────── */
    .table { color: var(--text); }
    .table thead th {
      background: var(--surface-2);
      border-color: var(--border);
      color: var(--muted);
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.5px;
      text-transform: uppercase;
      padding: 10px 16px;
    }
    .table tbody td {
      border-color: var(--border);
      padding: 12px 16px;
      font-size: 14px;
      vertical-align: middle;
    }
    .table tbody tr:hover td { background: rgba(255,255,255,.02); }
    .table tbody tr:last-child td { border-bottom: none; }

    /* ── Badges ───────────────────────────────────────────────────── */
    .badge-status {
      display: inline-flex; align-items: center; gap: 5px;
      padding: 4px 10px;
      border-radius: 20px;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.3px;
    }
    .badge-status::before {
      content: '';
      width: 5px; height: 5px;
      border-radius: 50%;
      background: currentColor;
    }
    .badge-pending    { background: rgba(247,184,79,.12); color: var(--warn); }
    .badge-in_progress{ background: rgba(79,110,247,.12); color: var(--accent); }
    .badge-completed  { background: rgba(56,198,160,.12); color: var(--accent-2); }
    .badge-delivered  { background: rgba(56,198,160,.20); color: #5eead4; }

    /* ── Buttons ──────────────────────────────────────────────────── */
    .btn-primary {
      background: var(--accent);
      border: none;
      font-size: 13px;
      font-weight: 600;
      padding: 8px 16px;
      border-radius: 7px;
      transition: opacity .15s, transform .1s;
    }
    .btn-primary:hover { opacity: .88; transform: translateY(-1px); }

    .btn-outline-secondary {
      border-color: var(--border);
      color: var(--muted);
      font-size: 13px;
      border-radius: 7px;
      padding: 7px 14px;
    }
    .btn-outline-secondary:hover { background: var(--surface-2); color: var(--text); border-color: var(--border); }

    .btn-sm { padding: 4px 10px !important; font-size: 12px !important; }

    .btn-ghost {
      background: none;
      border: none;
      color: var(--muted);
      padding: 6px 8px;
      border-radius: 6px;
      font-size: 15px;
      cursor: pointer;
      transition: color .15s, background .15s;
    }
    .btn-ghost:hover { color: var(--text); background: var(--surface-2); }
    .btn-ghost.danger:hover { color: var(--danger); }

    /* ── Forms ────────────────────────────────────────────────────── */
    .form-control, .form-select {
      background: var(--surface-2);
      border: 1px solid var(--border);
      color: var(--text);
      border-radius: 7px;
      font-size: 14px;
      padding: 9px 12px;
      transition: border-color .15s;
    }
    .form-control:focus, .form-select:focus {
      background: var(--surface-2);
      border-color: var(--accent);
      color: var(--text);
      box-shadow: 0 0 0 3px rgba(79,110,247,.15);
    }
    .form-control::placeholder { color: var(--muted); }
    .form-label { font-size: 13px; font-weight: 500; margin-bottom: 6px; }
    .form-select option { background: var(--surface); }

    /* ── Modal ────────────────────────────────────────────────────── */
    .modal-content {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      color: var(--text);
    }
    .modal-header {
      border-bottom: 1px solid var(--border);
      padding: 18px 24px;
    }
    .modal-title { font-weight: 600; font-size: 16px; }
    .modal-footer { border-top: 1px solid var(--border); padding: 14px 24px; }
    .btn-close { filter: invert(1) opacity(.5); }

    /* ── Alerts / Toast ───────────────────────────────────────────── */
    .alert {
      border-radius: 8px;
      font-size: 14px;
      border: 1px solid transparent;
    }
    .alert-success { background: rgba(56,198,160,.1); color: var(--accent-2); border-color: rgba(56,198,160,.2); }
    .alert-danger  { background: rgba(247,95,95,.1);  color: var(--danger);   border-color: rgba(247,95,95,.2); }

    /* ── Misc ─────────────────────────────────────────────────────── */
    .mono { font-family: 'DM Mono', monospace; }
    .text-muted { color: var(--muted) !important; }
    .empty-state {
      text-align: center;
      padding: 48px 24px;
      color: var(--muted);
    }
    .empty-state i { font-size: 36px; margin-bottom: 12px; opacity: .4; }
    .empty-state p { font-size: 14px; }
    hr { border-color: var(--border); opacity: 1; }

    /* ── Animations ───────────────────────────────────────────────── */
    @keyframes fadeUp {
      from { opacity:0; transform:translateY(12px); }
      to   { opacity:1; transform:translateY(0); }
    }
    .fade-up { animation: fadeUp .35s ease both; }
    .fade-up-1 { animation-delay: .05s; }
    .fade-up-2 { animation-delay: .10s; }
    .fade-up-3 { animation-delay: .15s; }
    .fade-up-4 { animation-delay: .20s; }
  </style>

  {% block head %}{% endblock %}
</head>
<body>

<!-- ── Sidebar ─────────────────────────────────────────────────────── -->
<aside class="sidebar">
  <div class="sidebar-brand d-flex align-items-center">
    <span class="logo-mark">N</span>
    <div>
      <div class="brand-name">Negocio</div>
      <div class="brand-tag">Demo v1.0</div>
    </div>
  </div>

  <nav class="sidebar-nav">
    <div class="nav-section-label">General</div>
    <a href="/views/dashboard" class="sidebar-link {% if active == 'dashboard' %}active{% endif %}">
      <i class="bi bi-grid-1x2-fill"></i> Dashboard
    </a>

    <div class="nav-section-label">Gestión</div>
    <a href="/views/clientes" class="sidebar-link {% if active == 'clientes' %}active{% endif %}">
      <i class="bi bi-people-fill"></i> Clientes
    </a>
    <a href="/views/pedidos" class="sidebar-link {% if active == 'pedidos' %}active{% endif %}">
      <i class="bi bi-bag-fill"></i> Pedidos
    </a>

    <div class="nav-section-label">Sistema</div>
    <a href="/docs" target="_blank" class="sidebar-link">
      <i class="bi bi-code-slash"></i> API Docs
    </a>
  </nav>

  <div class="sidebar-footer">
    API: <span>localhost:8000</span>
  </div>
</aside>

<!-- ── Main ───────────────────────────────────────────────────────── -->
<div class="main-wrap">
  <header class="topbar">
    <span class="topbar-title">{% block topbar_title %}{% endblock %}</span>
    <div class="topbar-actions">{% block topbar_actions %}{% endblock %}</div>
  </header>

  <main class="page-body">
    {% block content %}{% endblock %}
  </main>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
{% block scripts %}{% endblock %}
</body>
</html>
